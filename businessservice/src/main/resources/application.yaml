spring:
  application:
    name: businessservice
  cloud:
    config:
      enabled: false
  datasource:
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    url: jdbc:postgresql://localhost:5433/businessesdatabase
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        hibernate.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8082

