spring:
  cloud:
    config:
      fail-fast: true

      retry:
        initial-interval: 5000
        max-attempts: 10
        max-interval: 10000

eureka:
  client:
    fetch-registry: false
    register-with-eureka: false

  instance:
    prefer-ip-address: true

server:
  port: 8761

management:
  endpoint:
    health:
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health,info