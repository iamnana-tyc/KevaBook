spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bookingDb
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8083

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true

    service-url:
      default-zone: http://localhost:8761/eureka/


management:
  endpoints:
    web:
      exposure:
        include: health, info

  endpoint:
    health:
      probes:
        enabled: true
