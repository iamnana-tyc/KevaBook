spring:
  data:
    mongodb:
      uri: ${MONGO_URI}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/

    fetch-registry: true
    register-with-eureka: true

management:
  endpoint:
    health:
      probes:
        enabled: true

  endpoints:
    web:
      exposure:
        include: info,health